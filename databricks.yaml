bundle:
  name: lakebase

variables:
  lakebase_branch:
    description: Lakebase branch resource path
    default: projects/dev-instance/branches/production
  lakebase_database:
    description: Lakebase database resource path
    default: projects/dev-instance/branches/production/databases/databricks-postgres

# Ship the built frontend (gitignored) alongside the source.
sync:
  include:
    - frontend/dist/**

resources:
  apps:
    lakebase:
      name: lakebase
      description: "FastAPI app connected to a Databricks Lakebase database."
      source_code_path: .

      # Binds the app's service principal to the Lakebase database. On deploy
      # the platform auto-injects PGHOST/PGPORT/PGDATABASE/PGUSER/PGSSLMODE, and
      # app.yaml maps this resource to LAKEBASE_ENDPOINT via `valueFrom`.
      resources:
        - name: lakebase-postgres
          postgres:
            branch: ${var.lakebase_branch}
            database: ${var.lakebase_database}
            permission: CAN_CONNECT_AND_CREATE

targets:
  dev:
    default: true
    mode: development

  prod:
    mode: production
